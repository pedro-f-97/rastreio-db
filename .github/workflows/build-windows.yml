# Corre num runner Windows sempre que uma tag no formato "v*" (ex. v1.0.0) é
# criada e enviada para o GitHub. Gera o executável com o build.bat existente
# e publica-o como anexo de uma Release automática.

name: Build Windows

on:
  push:
    tags:
      - "v*"

# Necessário para o workflow poder criar a Release no repositório.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # Descarrega o código do repositório para o runner
      - name: Checkout do código
        uses: actions/checkout@v4

      # Instala o Python na versão que o projeto usa
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Instala o Node.js, necessário para compilar o frontend (npm run build)
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Corre exatamente o mesmo script usado localmente, para não haver
      # divergência entre o build de desenvolvimento e o de CI
      - name: Executar build.bat
        shell: cmd
        run: build.bat

      # O PyInstaller foi corrido em modo --onedir, ou seja, o resultado é
      # uma pasta com o .exe e as suas dependências, não um ficheiro único.
      # Para anexar a uma Release, compacta-se a pasta toda num .zip.
      - name: Compactar dist_executavel
        shell: pwsh
        run: Compress-Archive -Path dist_executavel\* -DestinationPath rastreio-db-windows.zip

      # Cria a Release associada à tag (ex. v1.0.0) e anexa o .zip
      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: rastreio-db-windows.zip